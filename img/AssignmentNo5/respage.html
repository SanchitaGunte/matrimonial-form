<!doctype html>
<html lang="en">
  <head>
    <title>Registeration form</title>
  </head>
  <body>
    <form action="">
      <h1>Registeration Form</h1>
      <h2>All fields are Mandatory</h2>
      <br />
      <label>First Name :</label>
      <input type="text" name="username" id="First Name" />
      <br /><br />
      <label>Last Name :</label>
      <input type="text" id="Last Name" name="Lastname" />
      <br /><br />
      <label>Age :</label>
      <input type="number" id="Age" name="age" />
      <br /><br />
      <h3>Are you Interested In Dating</h3>
      <label for="Yes">Yes</label>
      <input type="radio" name="datingInterest" id="Yes" value="Yes" />
      <label for="No">No</label>
      <input type="radio" name="datingInterest" id="No" value="No" />
      <h3>Your Preferences</h3>
      <select name="Preferences" id="Preferences">
        <option value="Well Educated">Well Educated</option>
        <option value="Working Professional">Working Professional</option>
        <option value="Family oriented">Family oriented</option>
      </select>
      <h3>Lifestyle Choices</h3>
      <input type="checkbox" name="choices" id="Non-Smoker" value="Non-Smoker" />
      <label for="Non-Smoker">Non-Smoker</label>
      <input type="checkbox" name="choices" id="Social-Drinker" value="Social-Drinker" />
      <label for="Social-Drinker">Social-Drinker</label>
      <input type="checkbox" name="choices" id="Teetotaler" value="Teetotaler"/>
      <label for="Teetotaler">Teetotaler</label>
      <br /><br />
      <label>Additional Information :</label><br>
      <textarea
        placeholder="write Your Preferences............"
        rows="4"
        cols="40"      >
      </textarea>
      <br><br>
      <button>Register</button>
    </form>
  </body>
</html>
